# iDB 加速代理 Nginx 配置
#
# 适用场景：国内服务器访问 GitHub / Docker Hub 较慢时，
# 在一台能访问外网的机器上部署此 Nginx 代理，加速 iDB 的安装、升级和镜像拉取。
#
# 部署步骤:
#   1. 将此文件放到代理服务器的 /etc/nginx/conf.d/idb-proxy.conf
#   2. 修改 server_name 为代理服务器的域名或 IP
#   3. nginx -t && systemctl reload nginx
#
# 使用方法:
#   安装时指定代理:
#     IDB_GITHUB_PROXY=http://your-proxy:8443 bash install.sh
#
#   升级时指定代理:
#     IDB_GITHUB_PROXY=http://your-proxy:8443 bash upgrade.sh
#
#   或在 .env 中持久化配置:
#     echo 'IDB_GITHUB_PROXY=http://your-proxy:8443' >> /var/lib/idb/.env

server {
    listen 8443;
    server_name your-proxy.example.com;  # 改为代理服务器的域名或 IP

    server_tokens off;

    # DNS 解析（使用公共 DNS）
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # --- GitHub Releases 文件下载代理 ---
    # 代理路径: /github-releases/sensdata/idb/releases/download/v0.1.1/idb.env
    # 原始路径: https://github.com/sensdata/idb/releases/download/v0.1.1/idb.env
    location /github-releases/ {
        proxy_pass https://github.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host github.com;
        proxy_set_header User-Agent "iDB-Proxy";

        proxy_buffering on;
        proxy_cache_valid 200 1h;
        proxy_read_timeout 300s;
        client_max_body_size 2g;
    }

    # --- GitHub API 代理（用于获取最新版本号）---
    # 代理路径: /github-api/repos/sensdata/idb/releases/latest
    # 原始路径: https://api.github.com/repos/sensdata/idb/releases/latest
    location /github-api/ {
        proxy_pass https://api.github.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.github.com;
        proxy_set_header User-Agent "iDB-Proxy";

        proxy_buffering on;
        proxy_cache_valid 200 60s;
    }

    # --- Docker Registry 代理（用于 docker pull）---
    # 配合 Docker daemon.json 使用:
    #   {"registry-mirrors": ["http://your-proxy:8443"]}
    #
    # 注意: Docker Registry v2 代理较复杂，建议使用专用的 registry mirror。
    # 如果只需要加速 GitHub Releases 下载（fallback 方式），可以不配置此项，
    # 脚本会自动从 GitHub Releases 下载镜像 tar 包。

    # 健康检查
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
