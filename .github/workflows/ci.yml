name: CI - Code Quality, Test and Native Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  code-quality:
    name: Code Quality (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [center, agent, core]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Ensure openssl is installed
        run: which openssl || (sudo apt-get update && sudo apt-get install -y openssl)

      - name: Generate keys and certs
        run: |
          make generate-key
          make generate-jwt-key
          make generate-certs

      - name: Verify generated release scripts
        run: |
          bash scripts/build-release-scripts.sh
          git diff --exit-code -- scripts/install.sh scripts/upgrade.sh

      - name: Check gofmt
        run: |
          cd ${{ matrix.module }}
          unformatted=$(gofmt -l .)
          if [ -n "${unformatted}" ]; then
            echo "The following files are not formatted:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Run golangci-lint
        run: |
          cd ${{ matrix.module }}
          golangci-lint run \
            --timeout=5m \
            --concurrency=1


  unit-test:
    runs-on: ubuntu-latest
    name: Unit Test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: Ensure openssl is installed
        run: which openssl || (sudo apt-get update && sudo apt-get install -y openssl)

      - name: Generate keys and certs
        run: |
          make generate-key
          make generate-jwt-key
          make generate-certs

      - name: Verify generated release scripts
        run: |
          bash scripts/build-release-scripts.sh
          git diff --exit-code -- scripts/install.sh scripts/upgrade.sh

      - name: Run unit tests
        run: |
          cd center && go test -v ./...
          cd ../agent && go test -v ./...
          cd ../core && go test -v ./...

  build-test:
    runs-on: ubuntu-latest
    name: Native Build Test
    env:
      VERSION_TAG: ci-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Ensure openssl is installed
        run: which openssl || (sudo apt-get update && sudo apt-get install -y openssl)

      - name: Generate keys and certs
        run: |
          make generate-key
          make generate-jwt-key
          make generate-certs

      - name: Generate release scripts
        run: bash scripts/build-release-scripts.sh

      - name: Build backend
        run: |
          cd center && make build
          cd ../agent && make build

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          IDB_ENABLE_IMAGEMIN=0 npm run build --silent

      - name: Build plugins
        run: |
          mkdir -p dist/plugins
          for p in scriptmanager mysqlmanager postgresql redis pma; do
            cd "plugins/$p"
            go mod download
            GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath \
              -ldflags="-s -w -X 'main.Version=${VERSION_TAG}'" \
              -o "../../dist/plugins/$p"
            cd - >/dev/null
          done
          cd plugins/rsync
          go mod download
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w -X 'main.Version=${VERSION_TAG}'" \
            -o ../../dist/plugins/idb-rsync

      - name: Package native bundles
        run: |
          mkdir -p dist/idb/home
          mkdir -p dist/idb/plugins
          cp center/idb dist/idb/
          cp center/idb.service dist/idb/
          cp center/idb.conf dist/idb/
          cp -R frontend/dist/. dist/idb/home/
          for name in scriptmanager mysqlmanager postgresql redis pma idb-rsync; do
            mkdir -p "dist/idb/plugins/${name}"
            cp "dist/plugins/${name}" "dist/idb/plugins/${name}/${name}"
            chmod +x "dist/idb/plugins/${name}/${name}"
          done
          tar -czf "idb_${VERSION_TAG}_linux_amd64.tar.gz" -C dist/idb .

          mkdir -p dist/idb-agent
          cp agent/idb-agent dist/idb-agent/
          cp agent/idb-agent.service dist/idb-agent/
          cp agent/idb-agent.conf dist/idb-agent/
          cp agent/install-agent.sh dist/idb-agent/
          echo "${VERSION_TAG}" > dist/idb-agent/idb-agent.version
          tar -czf "idb-agent_${VERSION_TAG}_linux_amd64.tar.gz" -C dist/idb-agent .

      - name: Verify native bundles
        run: |
          tar -tzf "idb_${VERSION_TAG}_linux_amd64.tar.gz" | grep -qx './idb'
          tar -tzf "idb_${VERSION_TAG}_linux_amd64.tar.gz" | grep -qx './idb.service'
          tar -tzf "idb_${VERSION_TAG}_linux_amd64.tar.gz" | grep -qx './idb.conf'
          tar -tzf "idb-agent_${VERSION_TAG}_linux_amd64.tar.gz" | grep -qx './idb-agent'
          tar -tzf "idb-agent_${VERSION_TAG}_linux_amd64.tar.gz" | grep -qx './install-agent.sh'
